<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta BEM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <img src="assets/img/logo.png" alt="" class="card__image">

        <div class="card__content">
            <h2 class="card__title">Aprendices ADSO</h2>

            <p class="card__description">
                Aprendices ADSO es un grupo de estudiantes que se encuentran en el programa de formación de desarrollo de software, con el objetivo de aprender y mejorar sus habilidades en programación y desarrollo web.
            </p>
        </div>

        <div class="card_action">
            <button class="card__button card__button--primary">Aceptar</button>
            <button class="card__button card__button--secondary">Cancelar</button>
        </div>

    </div>

</body>
</html>
